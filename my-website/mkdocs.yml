site_name: Kota Kurihara - Portfolio
site_url: https://kurihara31.github.io/portfolio/

theme:
  name: material
  language: ja

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - i18n:
      languages:
        - locale: ja
          name: 日本語
          default: true
        - locale: en
          name: English

nav:
  - Home: index.md
  - Publications: publications.md