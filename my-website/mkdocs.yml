site_name: Kota Kurihara - Portfolio
theme:
  name: material
  language: ja
  features:
    - content.code.copy
    - navigation.tabs

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - i18n:
      languages:
        - locale: ja
          name: 日本語
          default: true
        - locale: en
          name: English
      # 言語選択をヘッダーに分かりやすく表示させる設定
      reconfigure_material: true 

nav:
  - Home: index.md
  - Publications: publications.md